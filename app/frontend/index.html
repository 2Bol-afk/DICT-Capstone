<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agri Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7fbf0; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 gap-8">

  <div class="text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#0d631b] text-white mb-4 shadow-lg">
      <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1;">potted_plant</span>
    </div>
    <h1 class="text-3xl font-bold text-[#0d631b]">Agri Login</h1>
    <p class="text-gray-500 mt-1 text-sm">Crop Recommendation System</p>
  </div>

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
    <div class="space-y-3">
      <input id="username" type="text" placeholder="Username"
        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-[#0d631b] focus:ring-1 focus:ring-[#0d631b] transition"/>
      <input id="password" type="password" placeholder="Password"
        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-[#0d631b] focus:ring-1 focus:ring-[#0d631b] transition"/>
      <button id="loginBtn"
        class="w-full bg-[#0d631b] text-white font-bold py-2.5 rounded-lg text-sm hover:bg-green-800 transition active:scale-95">
        Mag-log in
      </button>
      <p id="loginError" class="text-xs text-red-500 hidden"></p>
      <p class="text-xs text-gray-400 text-center">
        Bagong username? Ililikha namin ang account mo gamit ang password na ito.
      </p>
    </div>
  </div>

<script>
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const err = document.getElementById("loginError");
    err.classList.add("hidden");
    if (!username || !password) {
      err.textContent = "Kailangan ang username at password.";
      err.classList.remove("hidden");
      return;
    }
    const btn = document.getElementById("loginBtn");
    btn.textContent = "Sandali lang...";
    btn.disabled = true;
    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.detail || "Hindi makapag-log in.";
        err.classList.remove("hidden");
        return;
      }
      if (data.role === "admin") {
        sessionStorage.setItem("adminAuth", "1");
        window.location.href = "/admin.html";
      } else {
        sessionStorage.setItem("farmerAuth", JSON.stringify(data));
        window.location.href = "/farmer.html";
      }
    } catch {
      err.textContent = "Hindi ma-konekta sa server.";
      err.classList.remove("hidden");
    } finally {
      btn.textContent = "Mag-log in";
      btn.disabled = false;
    }
  }

  document.getElementById("loginBtn").addEventListener("click", login);
  ["username", "password"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") login(); })
  );
</script>
</body></html>
